openapi: 3.0.0
info:
  title: Recloth API
  version: 1.0.0
  description: API Documentation for Recloth - Premium C2C Marketplace and Swap Platform.

servers:
  - url: http://localhost:8000/api
    description: Local Development Server

components:
  securitySchemes:
    SanctumAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - SanctumAuth: []

paths:
  # --- PUBLIC ROUTES ---
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      responses:
        '201':
          description: Created
  /auth/login:
    post:
      tags: [Auth]
      summary: User Login
      responses:
        '200':
          description: Success
  /products:
    get:
      tags: [Public]
      summary: List all products (Search/Filter)
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
  /products/{slug}:
    get:
      tags: [Public]
      summary: Get product detail
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
  /categories:
    get:
      tags: [Public]
      summary: List categories
      responses:
        '200':
          description: Success
  /stores/{slug}:
    get:
      tags: [Public]
      summary: Get store profile
      responses:
        '200':
          description: Success

  # --- AUTHENTICATED ROUTES ---
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        '200':
          description: Success
  /profile:
    get:
      tags: [Profile]
      summary: Get user profile
      responses:
        '200':
          description: Success
    post:
      tags: [Profile]
      summary: Update user profile
      responses:
        '200':
          description: Success
  /cart:
    get:
      tags: [Cart]
      summary: Get cart items
      responses:
        '200':
          description: Success
    post:
      tags: [Cart]
      summary: Add item to cart
      responses:
        '200':
          description: Success
  /cart/{product_id}:
    delete:
      tags: [Cart]
      summary: Remove item from cart
      responses:
        '200':
          description: Success
  /orders/checkout:
    post:
      tags: [Orders]
      summary: Create an order/checkout
      responses:
        '200':
          description: Success
  /orders:
    get:
      tags: [Orders]
      summary: List buyer orders
      responses:
        '200':
          description: Success
  /orders/seller:
    get:
      tags: [Orders]
      summary: List seller orders
      responses:
        '200':
          description: Success
  /swaps:
    get:
      tags: [Swap]
      summary: List swap requests
      responses:
        '200':
          description: Success
    post:
      tags: [Swap]
      summary: Create swap request
      responses:
        '200':
          description: Success
  /wallet:
    get:
      tags: [Wallet]
      summary: Get wallet balance
      responses:
        '200':
          description: Success
  /conversations:
    get:
      tags: [Chat]
      summary: List conversations
      responses:
        '200':
          description: Success
    post:
      tags: [Chat]
      summary: Create/Get conversation
      responses:
        '200':
          description: Success
  /conversations/{id}/messages:
    get:
      tags: [Chat]
      summary: List messages
      responses:
        '200':
          description: Success
    post:
      tags: [Chat]
      summary: Send message
      responses:
        '200':
          description: Success
